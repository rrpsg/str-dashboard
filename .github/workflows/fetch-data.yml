name: Fetch STR Listings

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 6 AM UTC (2 AM EST)
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write           # needed to commit data.json back to repo

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run scraper
        run: python scripts/fetch_data.py

      - name: Commit data.json if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          # Only commit if the file actually changed
          if git diff --staged --quiet; then
            echo "No changes to data.json — skipping commit"
          else
            git commit -m "chore: update STR data [$(date -u +%Y-%m-%d)]"
            git push
          fi
